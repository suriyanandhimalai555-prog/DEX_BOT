name: Build Pipeline

on:
  push:
    branches:
      - main
      - master


permissions:
  contents: read
  packages: write


jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3


      # Backend

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dex-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max



      # Frontend

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dex-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
