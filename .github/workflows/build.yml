name: Build Pipeline

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write


jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      # Backend Image
      - name: Build Backend Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/dex-backend:latest \
          ./backend


      # Frontend Image
      - name: Build Frontend Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/dex-frontend:latest \
          ./frontend


      # Worker Image (if you have worker folder)
      - name: Build Worker Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/dex-worker:latest \
          ./worker


      # Push Images

      - name: Push Backend
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/dex-backend:latest


      - name: Push Frontend
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/dex-frontend:latest


      - name: Push Worker
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/dex-worker:latest
